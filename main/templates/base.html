<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система заявок</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Roboto, Arial, sans-serif;
            background: #f5f5f5;
        }

        .layout {
            display: flex;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #1f1f1f;
            padding-top: 20px;
            position: fixed;
            left: 0;
            top: 0;
            transition: 0.3s;
        }

        .sidebar a {
            display: block;
            color: #e0e0e0;
            padding: 14px 20px;
            text-decoration: none;
            border-radius: 12px;
            margin: 5px 10px;
        }

        .sidebar a:hover {
            background: #2c2c2c;
        }

        .sidebar a.active {
            background: #6200ee;
            color: white;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
            flex: 1;
        }

        .menu-btn {
            display: none;
            font-size: 24px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .sidebar {
                left: -220px;
                z-index: 1000;
            }

            .sidebar.active {
                left: 0;
            }

            .content {
                margin-left: 0;
            }

            .menu-btn {
                display: block;
            }
        }
    </style>
</head>
<body>

<div class="layout">
    <div id="sidebar" class="sidebar">
        <a href="/orders/" class="{% if request.path == '/orders/' %}active{% endif %}">📋 Заявки</a>
    </div>

    <div class="content">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>
</div>

<script>
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
    }
    
    document.querySelectorAll('.sidebar a').forEach(link => {
        link.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('active');
            }
        });
    });
</script>

</body>
</html>
