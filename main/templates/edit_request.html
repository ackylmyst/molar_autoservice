{% extends 'base.html' %}

{% block content %}

<h2>Редактирование заявки</h2>

<form method="POST" style="max-width:300px;">
    {% csrf_token %}

    <input type="text" name="phone" value="{{ req.phone }}"><br><br>
    <input type="text" name="car_model" value="{{ req.car_model }}"><br><br>
    <input type="text" name="license_plate" value="{{ req.license_plate }}"><br><br>

    <button type="submit">Сохранить</button>
</form>

{% endblock %}
