{% extends 'base.html' %}

{% block content %}

<style>
    h1 {
        margin-top: 0;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 15px;
    }

    .card {
        padding: 16px;
        border-radius: 16px;
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        transition: 0.2s;
        word-break: break-word;
    }

    .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    .card b {
        font-size: 16px;
    }

    .card div {
        margin-top: 5px;
        color: #555;
    }

    .add-card {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        color: #6200ee;
        border: 2px dashed #ccc;
        cursor: pointer;
        background: transparent;
    }

    .add-card:hover {
        background: #f3e8ff;
    }

    /* МОДАЛКА */
    .modal {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
        padding: 10px;
    }

    .modal-content {
        background: white;
        padding: 20px;
        margin: 60px auto;
        width: 100%;
        max-width: 350px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);

        display: flex;
        flex-direction: column;
        align-items: center; /* центрируем содержимое */
    }

    form {
        width: 100%;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    input:focus {
        border-color: #6200ee;
        outline: none;
    }

    .btn {
        margin-top: 12px;
        padding: 10px;
        width: 100%;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: bold;
    }

    .btn-primary {
        background: #6200ee;
        color: white;
    }

    .btn-primary:hover {
        background: #4b00c2;
    }

    .btn-secondary {
        background: #eee;
    }

    .btn-secondary:hover {
        background: #ddd;
    }
</style>

<h1>Заявки</h1>

<div class="grid">

    {% for req in requests %}
        <div class="card">
            <b>ID: {{ req.id }}</b>
            <div>{{ req.phone }}</div>
            <div>{{ req.car_model }}</div>
            <div>{{ req.license_plate }}</div>
        </div>
    {% endfor %}

    <div class="card add-card" onclick="openModal()">+</div>

</div>

<div id="modal" class="modal">
    <div class="modal-content">

        <h3>Новая заявка</h3>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="phone" placeholder="Телефон">
            <input type="text" name="car_model" placeholder="Модель авто">
            <input type="text" name="license_plate" placeholder="Гос номер">

            <button class="btn btn-primary" type="submit">Сохранить</button>
        </form>

        <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>

    </div>
</div>

<script>
    function openModal() {
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }
</script>

{% endblock %}
